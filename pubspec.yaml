name: ki_sun
description: "AI-powered self-service tanning studio customer app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  connectivity_plus: ^5.0.2
  
  # State Management & Routing
  get: ^4.6.6
  
  # Networking
  dio: ^5.3.3
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Deep Links
  app_links: ^3.4.5
  
  # QR & Scanner
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  camera: ^0.10.5+9
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  image_picker: ^1.0.4
  
  # Animations
  rive: ^0.13.1
  lottie: ^2.7.0
  
  # UI & Typography
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.0
  
  # Notifications
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.1.0
  
  # Utils
  json_annotation: ^4.8.1
  intl: ^0.18.1
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  
  # Assets Generation
  flutter_launcher_icons: ^0.13.1
  # flutter_launcher_icons: ^0.13.1


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21



flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
